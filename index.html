<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Pro - Info Gasto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111827; --cyan: #22d3ee; --rose: #f43f5e; --amber: #fbbf24; --green: #10b981; --gray: #475569; --purple: #a855f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .header { padding: 30px 20px; background: #0f172a; border-bottom: 1px solid #1f2937; text-align: center; }
        .tasa-container { display: inline-flex; align-items: center; gap: 10px; background: rgba(31,41,55,0.5); padding: 8px 18px; border-radius: 50px; border: 1px solid #374151; font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 15px; cursor: pointer; }
        .main-balance { font-family: 'Orbitron'; font-size: 2.3rem; margin: 5px 0; }
        .usd-val { color: var(--cyan); font-weight: bold; font-size: 1.1rem; opacity: 0.9; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .btn-touch { background: var(--card); padding: 20px 10px; border-radius: 18px; border: 1px solid #1f2937; text-align: center; border-bottom: 4px solid transparent; cursor: pointer; }
        .list-item { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 12px; border-left: 6px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .detail-text { font-size: 0.7rem; color: var(--gray); margin-top: 4px; display: block; }
        
        /* CAJA DE INFORMACIÓN RESALTADA */
        .info-gasto { 
            background: rgba(34, 211, 238, 0.15); 
            color: #fff; 
            padding: 10px; 
            border-radius: 10px; 
            margin-top: 10px; 
            font-size: 0.85rem; 
            border: 1px dashed var(--cyan);
            display: block;
            font-weight: 500;
        }

        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; }
        .nav-btn { background: none; border: none; color: var(--gray); font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; }
        .nav-btn.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="header">
    <div class="tasa-container" onclick="setTasa()">
        <span>BCV: <span id="tasa-val">0.00</span></span>
    </div>
    <div id="bs-total" class="main-balance">0.00 Bs</div>
    <div id="usd-total" class="usd-val">≈ 0.00 $</div>
</div>

<div id="v-dash" class="view active">
    <div class="action-grid">
        <div class="btn-touch" style="border-bottom-color:var(--green)" onclick="registrarSeguro('Venta')">📥<br><small>Venta</small></div>
        <div class="btn-touch" style="border-bottom-color:var(--rose)" onclick="registrarSeguro('Gasto')">📤<br><small style="color:var(--rose); font-weight:bold;">Gasto</small></div>
        <div class="btn-touch" style="border-bottom-color:var(--rose)" onclick="registrarSeguro('Deuda')">📦<br><small>Nueva Deuda</small></div>
        <div class="btn-touch" style="border-bottom-color:var(--amber)" onclick="registrarSeguro('Fiado')">👤<br><small>Fiar Dulce</small></div>
    </div>
    <div id="lista-pendientes-dash"></div>
</div>

<div id="v-hist" class="view">
    <div id="lista-historial"></div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="nav('v-dash', this)">INICIO</button>
    <button class="nav-btn" onclick="nav('v-hist', this)">HISTORIAL</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx79T15qYpqB09Vf22uGiABkH3CLeKaBIi7yiYY2s60Kufk-Wqu4eB6WY2sLzNEAql_/exec";
    let db = {};

    async function init() {
        try {
            const r = await fetch(SCRIPT_URL);
            db = await r.json();
            document.getElementById('tasa-val').innerText = db.tasa;
            render();
        } catch(e) { alert("Error"); }
    }

    function formato12h(fechaStr) {
        if(!fechaStr || fechaStr === "Sin fecha") return "Sin fecha";
        try {
            const d = new Date(fechaStr);
            return d.toLocaleString('es-VE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true }).toUpperCase();
        } catch(e) { return fechaStr; }
    }

    function render() {
        let saldoBancario = parseFloat(db.saldoInicial) || 0;
        let histHtml = "";

        db.movimientos.slice(1).reverse().forEach(m => {
            let mnt = parseFloat(m[3]) || 0;
            let tipo = m[1];
            let esGasto = ["Gasto", "Abono_Pagado", "Deuda"].includes(tipo);
            let metodo = m[4] || "No definido";
            let detalleTexto = m[5] || ""; // Información del gasto

            if(["Venta","Abono_Cobrado"].includes(tipo)) saldoBancario += mnt;
            if(esGasto) saldoBancario -= mnt;
            
            histHtml += `
            <div class="list-item" style="border-left-color:${esGasto ? 'var(--rose)' : 'var(--green)'}">
                <div style="flex:1">
                    <b style="${esGasto ? 'color:var(--rose)' : ''}">${m[2]}</b> 
                    <small style="color:var(--cyan)">(${tipo})</small>
                    <span class="detail-text">📅 ${formato12h(m[0])}</span>
                    <span class="detail-text">💳 ${metodo}</span>
                    ${detalleTexto ? `<span class="info-gasto">ℹ️ INFO: ${detalleTexto}</span>` : ''}
                </div>
                <b style="${esGasto ? 'color:var(--rose)' : 'color:var(--green)'}">${mnt.toFixed(2)} Bs</b>
            </div>`;
        });

        document.getElementById('bs-total').innerText = saldoBancario.toFixed(2) + " Bs";
        document.getElementById('usd-total').innerText = "≈ " + (saldoBancario / db.tasa).toFixed(2) + " $";
        document.getElementById('lista-historial').innerHTML = histHtml;
    }

    async function registrarSeguro(tipo) {
        let nom = (tipo === "Venta") ? "ENTRADA" : (tipo === "Gasto" ? "GASTO" : prompt("Nombre:"));
        if(!nom) return;
        let m = prompt("Monto en Bs:");
        if(!m) return;
        let mp = prompt("Método de Pago:", "Pago Móvil");
        
        // AQUÍ ES DONDE DEBES ESCRIBIR EL DETALLE
        let det = prompt("¿EN QUÉ LO GASTASTE? (Escribe aquí para que aparezca en el historial):", "");

        enviar({ accion:"REGISTRAR", tipo, persona:nom, monto:parseFloat(m), tasa:db.tasa, descripcion: mp, detalle: det });
    }

    async function enviar(d) {
        document.body.style.opacity="0.5";
        await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(d)});
        location.reload();
    }

    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }
    window.onload = init;
</script>
</body>
</html>
