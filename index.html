<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Pro - Sistema Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111827; --cyan: #22d3ee; --rose: #f43f5e; --amber: #fbbf24; --green: #10b981; --gray: #475569; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 90px; }
        .header { padding: 25px; background: #0f172a; border-bottom: 1px solid #1f2937; text-align: center; }
        .tasa-container { display: inline-flex; align-items: center; gap: 10px; background: rgba(31,41,55,0.5); padding: 8px 18px; border-radius: 50px; border: 1px solid #374151; font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 10px; }
        .main-balance { font-family: 'Orbitron'; font-size: 2.2rem; margin: 5px 0; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .btn-touch { background: var(--card); padding: 20px 10px; border-radius: 18px; border: 1px solid #1f2937; text-align: center; border-bottom: 4px solid transparent; cursor: pointer; font-size: 0.85rem; }
        .btn-full { grid-column: span 2; }
        .list-item { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 12px; border-left: 6px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .detail-text { font-size: 0.7rem; color: var(--gray); margin-top: 4px; display: block; }
        .info-box { background: rgba(34, 211, 238, 0.1); padding: 8px; border-radius: 8px; margin-top: 8px; border-left: 3px solid var(--cyan); font-size: 0.8rem; color: #eee; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; }
        .nav-btn { background: none; border: none; color: var(--gray); font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; }
        .nav-btn.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="header">
    <div class="tasa-container" onclick="setTasa()">BCV: <span id="tasa-val">0.00</span></div>
    <div id="bs-total" class="main-balance">0.00 Bs</div>
    <div id="usd-total" style="color:var(--cyan)">≈ 0.00 $</div>
</div>

<div id="v-dash" class="view active">
    <div class="action-grid">
        <div class="btn-touch" style="border-bottom-color:var(--green)" onclick="registrarSeguro('Venta')">💰<br>Venta</div>
        <div class="btn-touch" style="border-bottom-color:var(--rose)" onclick="registrarSeguro('Gasto')">📤<br><span style="color:var(--rose)">Gasto</span></div>
        <div class="btn-touch" style="border-bottom-color:var(--rose)" onclick="registrarSeguro('Deuda')">📦<br>Nueva Deuda</div>
        <div class="btn-touch" style="border-bottom-color:var(--amber)" onclick="registrarSeguro('Fiado')">👤<br>Fiar Dulce</div>
        <div class="btn-touch btn-full" style="border-bottom-color:var(--cyan)" onclick="nav('v-abonos')">💸<br>PAGAR / COBRAR (Abonos)</div>
    </div>
    <div id="lista-pendientes-dash"></div>
</div>

<div id="v-abonos" class="view">
    <h3 style="font-family:'Orbitron'; font-size:0.9rem; color:var(--cyan)">SELECCIONA PARA ABONAR:</h3>
    <div id="lista-para-abonar"></div>
    <button onclick="nav('v-dash')" style="width:100%; color:var(--gray); background:none; border:none; padding:20px; font-family:'Orbitron';">← VOLVER</button>
</div>

<div id="v-hist" class="view">
    <div id="lista-historial"></div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="nav('v-dash', this)">INICIO</button>
    <button class="nav-btn" onclick="nav('v-hist', this)">HISTORIAL</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx79T15qYpqB09Vf22uGiABkH3CLeKaBIi7yiYY2s60Kufk-Wqu4eB6WY2sLzNEAql_/exec";
    let db = {};

    async function init() {
        try {
            const r = await fetch(SCRIPT_URL);
            db = await r.json();
            document.getElementById('tasa-val').innerText = db.tasa;
            render();
        } catch(e) { alert("Error de conexión"); }
    }

    function render() {
        let saldoBancario = parseFloat(db.saldoInicial) || 0;
        let pendHtml = "", histHtml = "";

        // Historial y Saldo
        db.movimientos.slice(1).reverse().forEach(m => {
            let mnt = parseFloat(m[3]) || 0;
            let tipo = m[1];
            let esGasto = ["Gasto", "Abono_Pagado", "Deuda"].includes(tipo);
            let detalleGasto = m[5] || ""; // Columna F

            if(["Venta","Abono_Cobrado"].includes(tipo)) saldoBancario += mnt;
            if(esGasto) saldoBancario -= mnt;
            
            histHtml += `
            <div class="list-item" style="border-left-color:${esGasto ? 'var(--rose)' : 'var(--green)'}">
                <div style="flex:1">
                    <b style="${esGasto ? 'color:var(--rose)' : ''}">${m[2]}</b> 
                    <small style="color:var(--cyan)">(${tipo})</small>
                    <span class="detail-text">📅 ${m[0]} | 💳 ${m[4] || 'Efectivo'}</span>
                    ${detalleGasto ? `<div class="info-box">ℹ️ ${detalleGasto}</div>` : ''}
                </div>
                <b style="${esGasto ? 'color:var(--rose)' : 'color:var(--green)'}">${mnt.toFixed(2)} Bs</b>
            </div>`;
        });

        // Listado de Deudas (Pagar/Cobrar)
        db.entidades.slice(1).forEach(e => {
            let sActual = parseFloat(e[2]) || 0;
            if(Math.abs(sActual) > 0.1) {
                let esD = e[1] === "Proveedor";
                let card = `<div class="list-item" style="border-left-color:${esD?'var(--rose)':'var(--amber)'}" onclick="ejecutarAbono('${e[0]}', ${sActual}, '${e[1]}')">
                    <div><b>${e[0]}</b><br><small style="color:${esD?'var(--rose)':'var(--amber)'}">${esD?'YO DEBO':'ME DEBEN'}</small></div>
                    <div style="text-align:right"><b>${sActual.toFixed(2)} Bs</b></div>
                </div>`;
                pendHtml += card;
            }
        });

        document.getElementById('bs-total').innerText = saldoBancario.toFixed(2) + " Bs";
        document.getElementById('usd-total').innerText = "≈ " + (saldoBancario / db.tasa).toFixed(2) + " $";
        document.getElementById('lista-para-abonar').innerHTML = pendHtml || "Sin cuentas pendientes";
        document.getElementById('lista-historial').innerHTML = histHtml;
    }

    async function registrarSeguro(tipo) {
        let nom = (tipo === "Venta") ? "ENTRADA" : (tipo === "Gasto" ? "GASTO" : prompt("Nombre:"));
        if(!nom) return;
        let m = prompt("Monto en Bs:");
        if(!m) return;
        let mp = prompt("Método:", "Pago Móvil");
        let det = prompt("¿En qué se gastó? (Opcional):", "");
        enviar({ accion:"REGISTRAR", tipo, persona:nom, monto:parseFloat(m), tasa:db.tasa, descripcion: mp, detalle: det });
    }

    function ejecutarAbono(nom, sal, tipo) {
        let m = prompt(`Abono para ${nom} (Saldo: ${sal} Bs):`, sal);
        if(!m) return;
        let mp = prompt("Método:", "Pago Móvil");
        let det = prompt("Nota del abono:", "");
        enviar({ accion:"REGISTRAR", tipo: tipo==="Proveedor"?"Abono_Pagado":"Abono_Cobrado", persona:nom, monto:parseFloat(m), tasa:db.tasa, descripcion: mp, detalle: det });
    }

    async function enviar(d) {
        document.body.style.opacity="0.5";
        await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(d)});
        location.reload();
    }

    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }
    window.onload = init;
</script>
</body>
</html>
