<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Pro</title>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2d; --cyan: #22d3ee; --rose: #ff4d6d; --amber: #fbbf24; --green: #2dd4bf; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; background: #0f172a; text-align: center; border-bottom: 1px solid #1e293b; }
        .tasa-tag { background: #1e293b; color: var(--cyan); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .balance { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        .info-card { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; font-size: 0.7rem; border-bottom: 3px solid transparent; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .btn { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; border: 1px solid #2d3748; cursor: pointer; }
        .list-item { background: var(--card); margin: 10px 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
    </style>
</head>
<body>

<div class="header">
    <div class="tasa-tag" onclick="actualizarTasa()">TASA HOY: <span id="tasa-val">0.00</span></div>
    <div class="balance" id="saldo-bs">0.00 Bs</div>
    <div class="info-grid">
        <div class="info-card" style="border-color: var(--amber)">ME DEBEN<br><span id="me-deben" style="color:var(--amber); font-size:1.1rem">0.00</span></div>
        <div class="info-card" style="border-color: var(--rose)">YO DEBO<br><span id="yo-debo" style="color:var(--rose); font-size:1.1rem">0.00</span></div>
    </div>
</div>

<div id="v-dash">
    <div class="btn-grid">
        <div class="btn" style="color:var(--green)" onclick="nuevo('Venta')">VENTA</div>
        <div class="btn" style="color:var(--rose)" onclick="nuevo('Gasto')">GASTO</div>
        <div class="btn" style="color:var(--rose)" onclick="nuevo('Deuda')">DEUDA</div>
        <div class="btn" style="color:var(--amber)" onclick="nuevo('Fiado')">FIADO</div>
    </div>
    <div id="lista-deudas"></div>
</div>

<script>
    const URL = "TU_URL_DE_SCRIPT";
    let datos = {};

    async function cargar() {
        const r = await fetch(URL);
        datos = await r.json();
        document.getElementById('tasa-val').innerText = datos.tasa;
        render();
    }

    function render() {
        let saldo = parseFloat(datos.saldoInicial);
        let debeBs = 0, debenBs = 0;
        let htmlDeudas = "";

        // Calculamos saldos por persona
        let saldos = {};
        datos.movimientos.slice(1).forEach(m => {
            let persona = m[2], tipo = m[1], monto = parseFloat(m[3]);
            if (!saldos[persona]) saldos[persona] = 0;
            
            if (["Fiado", "Venta", "Abono_Pagado"].includes(tipo)) saldos[persona] += monto;
            else if (["Deuda", "Gasto", "Abono_Cobrado"].includes(tipo)) saldos[persona] -= monto;
            
            if (["Venta", "Abono_Cobrado"].includes(tipo)) saldo += monto;
            if (["Gasto", "Abono_Pagado"].includes(tipo)) saldo -= monto;
        });

        Object.keys(saldos).forEach(p => {
            let s = saldos[p];
            if (Math.abs(s) > 1) {
                let esDeuda = s < 0; // Yo debo
                if (esDeuda) debeBs += Math.abs(s); else debenBs += s;
                
                htmlDeudas += `
                <div class="list-item" style="border-color: ${esDeuda ? 'var(--rose)' : 'var(--amber)'}" onclick="gestionar('${p}', ${Math.abs(s)}, ${esDeuda})">
                    <div><b>${p}</b><br><small>${esDeuda ? 'YO DEBO' : 'ME DEBEN'}</small></div>
                    <div style="text-align:right">
                        <b>${Math.abs(s).toFixed(2)} Bs</b><br>
                        <small style="color:var(--cyan)">$${(Math.abs(s)/datos.tasa).toFixed(2)}</small>
                    </div>
                </div>`;
            }
        });

        document.getElementById('saldo-bs').innerText = saldo.toFixed(2) + " Bs";
        document.getElementById('me-deben').innerText = debenBs.toFixed(2) + " Bs";
        document.getElementById('yo-debo').innerText = debeBs.toFixed(2) + " Bs";
        document.getElementById('lista-deudas').innerHTML = htmlDeudas;
    }

    function gestionar(nombre, monto, esDeuda) {
        let op = prompt(`${nombre} (${monto.toFixed(2)} Bs)\n1. ABONAR\n2. PAGAR TODO\n3. SUMAR MÁS`, "1");
        if (op == "1") {
            let a = prompt("Monto del abono:");
            if (a) enviar(esDeuda ? "Abono_Pagado" : "Abono_Cobrado", nombre, a);
        } else if (op == "2") {
            enviar(esDeuda ? "Abono_Pagado" : "Abono_Cobrado", nombre, monto);
        } else if (op == "3") {
            let s = prompt("Monto a sumar:");
            if (s) enviar(esDeuda ? "Deuda" : "Fiado", nombre, s);
        }
    }

    async function enviar(tipo, persona, monto) {
        let desc = prompt("Descripción:", "Touch App");
        await fetch(URL, {
            method: 'POST',
            body: JSON.stringify({ tipo, persona, monto, tasa: datos.tasa, descripcion: desc })
        });
        location.reload();
    }

    function nuevo(tipo) {
        let p = prompt("Nombre:");
        let m = prompt("Monto Bs:");
        if (p && m) enviar(tipo, p, m);
    }

    cargar();
</script>
</body>
</html>
