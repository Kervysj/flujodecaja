<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard - Richard Morales</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: rgba(23, 32, 53, 0.8);
            --cyan: #22d3ee;   /* Disponible / Ingresos */
            --red: #fb7185;    /* Deudas / Egresos */
            --amber: #fbbf24;  /* Dinero en Calle (Clientes) */
            --green: #4ade80;  /* Éxito / Solvente */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #e2e8f0;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Indicadores Superiores */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .mini-card {
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .c-verde { background: rgba(34, 211, 238, 0.1); border-color: var(--cyan); color: var(--cyan); }
        .c-rojo { background: rgba(251, 113, 133, 0.1); border-color: var(--red); color: var(--red); }
        .c-amarillo { background: rgba(251, 191, 36, 0.1); border-color: var(--amber); color: var(--amber); }

        .val { display: block; font-size: 1.1rem; margin-top: 5px; }

        .container { padding: 15px; }

        /* Tarjetas de Gráficos y Listas */
        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* Botonera Principal */
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-in { background: var(--cyan); color: #0b0f1a; }
        .btn-out { background: var(--red); color: #0b0f1a; }

        /* Formulario */
        .modal { display: none; }
        input, select {
            width: 100%; padding: 14px; margin: 8px 0;
            background: #1e293b; border: 1px solid #334155;
            color: white; border-radius: 10px; box-sizing: border-box;
            font-size: 1rem;
        }

        /* Lista de Personas */
        .person-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            border-radius: 15px;
            border-left: 4px solid transparent;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="summary-grid">
    <div class="mini-card c-verde">DISPONIBLE <span class="val" id="sum-disp">$0.00</span></div>
    <div class="mini-card c-rojo">DEUDAS <span class="val" id="sum-deuda">$0.00</span></div>
    <div class="mini-card c-amarillo">EN CALLE <span class="val" id="sum-calle">$0.00</span></div>
</div>

<div class="container">
    
    <div class="card" style="text-align:center;">
        <h4 style="margin-top:0; color: #94a3b8;">Balance de Riesgo</h4>
        <canvas id="mainChart" height="200"></canvas>
    </div>

    <div class="action-btns">
        <button class="btn btn-in" onclick="showForm('entrada')">⊕ REGISTRAR ENTRADA</button>
        <button class="btn btn-out" onclick="showForm('salida')">⊖ REGISTRAR SALIDA</button>
    </div>

    <div id="form-container" class="card modal">
        <h3 id="form-title" style="margin-top:0; color: var(--cyan);">Nuevo Registro</h3>
        <label>Tipo de Operación</label>
        <select id="f-tipo">
            <option value="Ingreso">Venta / Ingreso Directo</option>
            <option value="Abono_Prov">Abonar a Proveedor (Pago)</option>
            <option value="Deuda_Prov">Cargar Deuda (Compra a crédito)</option>
            <option value="Cobro_Cli">Cobro a Cliente (Entra Dinero)</option>
            <option value="Fiado_Cli">Dar Fiado (Dinero a la calle)</option>
        </select>
        
        <input type="text" id="f-benef" placeholder="Nombre de Persona / Empresa">
        <input type="number" id="f-monto" placeholder="Monto en $">
        <input type="text" id="f-ref" placeholder="Referencia / Pago Móvil / Efectivo">
        <input type="text" id="f-conc" placeholder="Concepto (Ej: Pago Harina)">
        
        <button class="btn btn-in" style="width:100%; margin-top:10px;" onclick="enviar()">CONFIRMAR REGISTRO</button>
        <button class="btn" style="width:100%; background:transparent; color:#94a3b8" onclick="hideForm()">Cancelar</button>
    </div>

    <h3 style="color: #94a3b8; font-size: 1rem;">ESTADO DE CUENTAS DETALLADO</h3>
    <div id="lista-personas">
        </div>

</div>

<script>
    // URL ACTUALIZADA POR EL USUARIO
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoJjRvVqz5LBiwV5Qz2R1pVgX6MK5BrtYTP37jgy_uE9Si1Mk713Uod9g1-UErHb1E/exec";

    window.onload = fetchData;

    async function fetchData() {
        try {
            const resp = await fetch(SCRIPT_URL);
            const d = await resp.json();
            actualizarDashboard(d);
        } catch (e) { console.error("Error al obtener datos"); }
    }

    function actualizarDashboard(data) {
        let totalDeuda = 0;
        let totalCalle = 0;
        const container = document.getElementById('lista-personas');
        container.innerHTML = '';

        // Procesar Proveedores (Rojo)
        data.proveedores.slice(1).forEach(p => {
            const saldo = parseFloat(p[2]) || 0;
            totalDeuda += saldo;
            if (saldo > 0 || saldo < 0) crearTarjeta(p[0], saldo, 'var(--red)', 'PROVEEDOR');
            else crearTarjeta(p[0], saldo, 'var(--green)', 'SOLVENTE');
        });

        // Procesar Clientes (Amarillo)
        data.clientes.slice(1).forEach(c => {
            const saldo = parseFloat(c[2]) || 0;
            totalCalle += saldo;
            if (saldo > 0) crearTarjeta(c[0], saldo, 'var(--amber)', 'CLIENTE');
        });

        document.getElementById('sum-deuda').innerText = `$ ${totalDeuda.toFixed(2)}`;
        document.getElementById('sum-calle').innerText = `$ ${totalCalle.toFixed(2)}`;
        
        renderChart(totalDeuda, totalCalle);
    }

    function crearTarjeta(nombre, monto, color, etiqueta) {
        const div = document.createElement('div');
        div.className = 'person-item';
        div.style.borderLeftColor = color;
        
        const icono = monto <= 0 ? '✅' : '🔔';
        
        div.innerHTML = `
            <div>
                <div style="font-weight:bold;">${icono} ${nombre}</div>
                <small style="color:#64748b;">${etiqueta}</small>
            </div>
            <div style="text-align:right;">
                <div style="color:${color}; font-weight:bold;">$${Math.abs(monto).toFixed(2)}</div>
            </div>
        `;
        document.getElementById('lista-personas').appendChild(div);
    }

    function renderChart(deuda, calle) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Deuda (Rojo)', 'En Calle (Amarillo)'],
                datasets: [{
                    data: [deuda, calle],
                    backgroundColor: ['#fb7185', '#fbbf24'],
                    hoverOffset: 4,
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                cutout: '70%'
            }
        });
    }

    function showForm(type) {
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('form-title').innerText = type === 'entrada' ? 'Registrar Entrada' : 'Registrar Salida';
        window.scrollTo(0, 500);
    }

    function hideForm() { document.getElementById('form-container').style.display = 'none'; }

    async function enviar() {
        const btn = event.target;
        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        const payload = {
            tipo: document.getElementById('f-tipo').value,
            beneficiario: document.getElementById('f-benef').value,
            monto: parseFloat(document.getElementById('f-monto').value),
            referencia: document.getElementById('f-ref').value,
            concepto: document.getElementById('f-conc').value
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("¡Sincronizado con éxito!");
            location.reload();
        } catch (e) {
            alert("Error al guardar. Verifica la conexión.");
            btn.disabled = false;
            btn.innerText = "REINTENTAR";
        }
    }
</script>

</body>
</html>
