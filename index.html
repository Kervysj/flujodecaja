<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DebtControl Premium</title>

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkRlYnRDb250cm9sIFByZW1pdW0iLAogICJzaG9ydF9uYW1lIjogIkRlYnRDdXVkZXMiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBhMGEwYSIsCiAgInRoZW1lX2NvbG9yIjogIzAwZDFmZiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzI3MjIvMjcyMjU2NC5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #00d1ff;
            --text: #e0e0e0;
            --danger: #ff4d4d;
            --success: #00ff88;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 20px 100px 20px;
        }

        .container { max-width: 500px; margin: auto; }
        h2 { color: var(--accent); text-align: center; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; margin-bottom: 25px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }

        .acordeon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .status-badge {
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(0, 209, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            text-align: right;
            line-height: 1.3;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        label { font-size: 11px; color: var(--accent); margin-left: 5px; text-transform: uppercase; font-weight: bold; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .portion-item {
            background: #1f1f1f;
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .btn-check {
            background: var(--success);
            width: 70px;
            padding: 12px;
            margin: 0;
            font-size: 16px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f0f0f;
            display: flex;
            border-top: 1px solid var(--border);
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .hidden { display: none; }

        .hist-content {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #444;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="app-title">PRODUCCIÓN</h2>
    
    <div id="view-nueva" class="view">
        <div class="card">
            <h3 style="margin:0 0 20px 0; font-weight: 300; text-align: center; color: var(--text);">Nueva Producción</h3>
            
            <label>Nombre del Producto</label>
            <input type="text" id="prod-nombre" placeholder="Ej: PIE DE PARCHITA">
            
            <div style="display:flex; gap:10px">
                <div style="flex:1">
                    <label>Porciones</label>
                    <input type="number" id="prod-cant" placeholder="12">
                </div>
                <div style="flex:1">
                    <label>Inversión Lote ($)</label>
                    <input type="number" id="prod-costo-total" placeholder="10.0">
                </div>
            </div>

            <div style="display:flex; gap:10px">
                <div style="flex:1">
                    <label>Precio Venta ($)</label>
                    <input type="number" id="prod-precio" placeholder="2.0">
                </div>
                <div style="flex:1">
                    <label>Fecha Lote</label>
                    <input type="date" id="prod-fecha-manual">
                </div>
            </div>
            
            <button onclick="crearLote()">REGISTRAR LOTE</button>
        </div>
    </div>

    <div id="view-pendientes" class="view hidden">
        <div id="lista-pendientes"></div>
    </div>

    <div id="view-historial" class="view hidden">
        <button id="btn-borrar-hist" class="hidden" style="background: var(--danger); margin-bottom:20px;" onclick="borrarHistorial()">BORRAR HISTORIAL DEFINITIVO</button>
        <div id="lista-historial"></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="changeView('nueva', this)"><span>➕</span><br>Nuevo</div>
    <div class="nav-item" onclick="changeView('pendientes', this)"><span>⏳</span><br>Cobros</div>
    <div class="nav-item" onclick="changeView('historial', this)"><span>📜</span><br>Historial</div>
</div>

<script>
    document.getElementById('prod-fecha-manual').valueAsDate = new Date();

    let lotes = JSON.parse(localStorage.getItem('lotes_v5')) || [];
    let historial = JSON.parse(localStorage.getItem('historial_v5')) || [];

    function crearLote() {
        const nombreInput = document.getElementById('prod-nombre');
        const cantInput = document.getElementById('prod-cant');
        const precioInput = document.getElementById('prod-precio');
        const costoInput = document.getElementById('prod-costo-total');
        const fechaInput = document.getElementById('prod-fecha-manual');

        const nombre = nombreInput.value.toUpperCase().trim();
        const cant = parseInt(cantInput.value);
        const precio = precioInput.value;
        const costoTotal = parseFloat(costoInput.value) || 0;
        const fechaProd = fechaInput.value;

        if(!nombre || isNaN(cant) || !precio || !fechaProd) {
            alert("⚠️ Por favor, rellena todos los campos correctamente.");
            return;
        }

        const nuevoLote = {
            id: Date.now(),
            nombre: nombre,
            fechaProd: fechaProd,
            costoLote: costoTotal,
            cantTotal: cant, // Cantidad estática inicial
            vendidas: 0,      // Contador de ventas
            porciones: Array(cant).fill().map((_, i) => ({
                id_p: i,
                precio: precio
            }))
        };

        lotes.push(nuevoLote);
        save();
        render();
        
        nombreInput.value = "";
        cantInput.value = "";
        precioInput.value = "";
        costoInput.value = "";
        
        alert("✅ Lote registrado correctamente.");
    }

    function cobrar(loteId, porcionIdx) {
        const clienteVal = document.getElementById(`cli-${loteId}-${porcionIdx}`).value.trim();
        const fechaEntVal = document.getElementById(`fent-${loteId}-${porcionIdx}`).value;
        
        if(!clienteVal) {
            alert("Escribe el nombre del cliente que lleva la porción.");
            return;
        }

        const ref = prompt(`Referencia de pago para ${clienteVal}:`);
        if(ref === null) return;

        const lote = lotes.find(l => l.id === loteId);
        const p = lote.porciones[porcionIdx];

        // Incrementar contador de vendidas
        lote.vendidas++;

        historial.unshift({
            producto: lote.nombre,
            cliente: clienteVal,
            precio: p.precio,
            fechaProd: lote.fechaProd,
            fechaEnt: fechaEntVal,
            fechaPago: new Date().toLocaleDateString(),
            ref: ref || "S/R"
        });

        lote.porciones.splice(porcionIdx, 1);

        // Lógica de finalización y felicitación
        if(lote.porciones.length === 0) {
            const totalRecaudado = lote.cantTotal * p.precio;
            const gananciaNeta = totalRecaudado - lote.costoLote;
            
            alert(`🎉 ¡FELICITACIONES! 🎉\n\nHas vendido todas las porciones de ${lote.nombre}.\n\n💰 Recaudado: $${totalRecaudado.toFixed(2)}\n📉 Inversión: $${lote.costoLote.toFixed(2)}\n✨ GANANCIA NETA: $${gananciaNeta.toFixed(2)}`);
            
            lotes = lotes.filter(l => l.id !== loteId);
        }

        save();
        render();
    }

    function save() {
        localStorage.setItem('lotes_v5', JSON.stringify(lotes));
        localStorage.setItem('historial_v5', JSON.stringify(historial));
    }

    function render() {
        const listaP = document.getElementById('lista-pendientes');
        const listaH = document.getElementById('lista-historial');
        
        listaP.innerHTML = lotes.length === 0 ? "<div style='text-align:center; padding:50px; color:#555'>No hay cobros pendientes</div>" : "";
        
        lotes.forEach((l, idxLote) => {
            let html = `<div class="card">
                <div class="acordeon-header" onclick="toggleLote(${idxLote})">
                    <div>
                        <strong style="color:var(--accent); font-size:16px">${l.nombre}</strong><br>
                        <small style="color:#666">Hecho el: ${l.fechaProd}</small>
                    </div>
                    <div class="status-badge">
                        Total: ${l.cantTotal}<br>
                        Vendidas: ${l.vendidas}
                    </div>
                </div>
                
                <div id="lote-det-${idxLote}" class="hidden" style="margin-top:20px; border-top: 1px solid #333; padding-top:10px">`;
            
            l.porciones.forEach((p, idx) => {
                html += `<div class="portion-item">
                    <label>Nombre del Cliente</label>
                    <input type="text" id="cli-${l.id}-${idx}" placeholder="¿Quién lo debe?" style="margin-bottom:10px">
                    <div style="display:flex; gap:10px; align-items:flex-end">
                        <div style="flex:1">
                            <label>Fecha de Entrega</label>
                            <input type="date" id="fent-${l.id}-${idx}" value="${new Date().toISOString().split('T')[0]}" style="margin:0">
                        </div>
                        <button class="btn-check" onclick="cobrar(${l.id}, ${idx})">OK</button>
                    </div>
                </div>`;
            });
            html += `</div></div>`;
            listaP.innerHTML += html;
        });

        listaH.innerHTML = "";
        historial.forEach((h, i) => {
            listaH.innerHTML += `<div class="card" onclick="toggleHist(${i})">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span><b>${h.producto}</b><br><small>${h.cliente}</small></span>
                    <span style="color:var(--success); font-weight:bold">$${h.precio} ▾</span>
                </div>
                <div id="hist-det-${i}" class="hidden hist-content">
                    <strong>Ref:</strong> <span style="color:var(--accent)">${h.ref}</span><br>
                    <strong>Preparación:</strong> ${h.fechaProd}<br>
                    <strong>Entregado:</strong> ${h.fechaEnt}<br>
                    <strong>Cobrado:</strong> ${h.fechaPago}
                </div>
            </div>`;
        });

        document.getElementById('btn-borrar-hist').classList.toggle('hidden', historial.length < 45);
    }

    function toggleLote(idx) {
        document.getElementById(`lote-det-${idx}`).classList.toggle('hidden');
    }

    function toggleHist(i) {
        document.getElementById(`hist-det-${i}`).classList.toggle('hidden');
    }

    function changeView(view, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('app-title').innerText = view === 'nueva' ? 'PRODUCCIÓN' : (view === 'pendientes' ? 'COBROS' : 'HISTORIAL');
    }

    function borrarHistorial() {
        if(confirm("¿Estás seguro de que quieres vaciar el historial?")) { 
            historial = []; 
            save(); 
            render(); 
        }
    }

    render();
</script>
</body>
</html>
