<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Pro - Richard Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1a; 
            --card: #161e2d; 
            --cyan: #22d3ee; 
            --rose: #ff4d6d; 
            --amber: #fbbf24; 
            --green: #2dd4bf; 
            --gray: #94a3b8; 
            --text-main: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 90px; 
            line-height: 1.4;
        }

        /* HEADER */
        .header { 
            padding: 20px; 
            background: #0f172a; 
            border-bottom: 1px solid #1e293b; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .tasa-container { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            background: #1e293b; 
            padding: 4px 12px; 
            border-radius: 8px; 
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem; 
            color: var(--cyan);
            margin-bottom: 10px;
            border: 1px solid #334155;
        }
        .main-balance { 
            font-family: 'Roboto Mono', monospace; 
            font-size: 2.2rem; 
            font-weight: 800;
            margin: 0; 
            color: #fff;
        }
        
        /* Nuevos indicadores de deuda/cobro */
        .info-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .info-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            text-align: center;
        }
        .info-box span {
            display: block;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 4px;
        }

        /* BOTONES */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .btn-touch { 
            background: var(--card); 
            padding: 18px 10px; 
            border-radius: 16px; 
            border: 1px solid #2d3748; 
            text-align: center; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 700;
            color: #e2e8f0;
        }
        .btn-touch:active { transform: translateY(2px); background: #1e293b; }

        .section-title { 
            font-size: 0.75rem; 
            font-weight: 800;
            color: var(--gray); 
            padding: 10px 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        /* LISTAS */
        .list-item { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 14px; 
            margin: 0 15px 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #1e293b;
        }
        .list-item b { font-size: 1rem; color: #fff; }
        .list-item .amount-text { 
            font-family: 'Roboto Mono', monospace; 
            font-size: 1.05rem; 
            font-weight: 700;
            text-align: right;
        }
        .list-item small { color: var(--gray); font-size: 0.75rem; }

        .view { display: none; animation: fadeIn 0.2s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* NAV */
        .nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: #0f172a; 
            display: flex; justify-content: space-around; 
            padding: 15px 0; 
            border-top: 1px solid #1e293b; 
            z-index: 100; 
        }
        .nav-btn { 
            background: none; border: none; 
            color: var(--gray); 
            font-size: 0.75rem; 
            font-weight: 800;
        }
        .nav-btn.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
    </style>
</head>
<body>

<div class="header">
    <div class="tasa-container">TASA HOY: <span id="tasa-val" style="color:#fff">0.00</span></div>
    <div id="bs-total" class="main-balance">0.00 Bs</div>
    
    <div class="info-bar">
        <div class="info-box" style="border-bottom: 3px solid var(--amber)">
            ME DEBEN (FIADOS)
            <span id="info-me-deben" style="color: var(--amber)">0.00 Bs</span>
        </div>
        <div class="info-box" style="border-bottom: 3px solid var(--rose)">
            YO DEBO (DEUDAS)
            <span id="info-yo-debo" style="color: var(--rose)">0.00 Bs</span>
        </div>
    </div>
</div>

<div id="v-dash" class="view active">
    <div class="action-grid">
        <div class="btn-touch" style="border-top: 3px solid var(--green)" onclick="registrarNuevo('Venta')">💰 VENTA</div>
        <div class="btn-touch" style="border-top: 3px solid var(--rose)" onclick="registrarNuevo('Gasto')">📤 GASTO</div>
        <div class="btn-touch" style="border-top: 3px solid var(--rose)" onclick="registrarNuevo('Deuda')">📦 DEUDA</div>
        <div class="btn-touch" style="border-top: 3px solid var(--amber)" onclick="registrarNuevo('Fiado')">👤 FIADO</div>
    </div>
    
    <div class="section-title">Cuentas Pendientes (Fiados y Deudas)</div>
    <div id="lista-pendientes-inicio"></div>
</div>

<div id="v-hist" class="view">
    <div class="section-title" style="margin-top:15px">Historial de Todos los Movimientos</div>
    <div id="lista-historial"></div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="nav('v-dash', this)">DASHBOARD</button>
    <button class="nav-btn" onclick="nav('v-hist', this)">HISTORIAL</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx79T15qYpqB09Vf22uGiABkH3CLeKaBIi7yiYY2s60Kufk-Wqu4eB6WY2sLzNEAql_/exec";
    let db = {};

    async function init() {
        try {
            const r = await fetch(SCRIPT_URL);
            db = await r.json();
            
            let confirmarTasaInicial = confirm(`Richard, ¿mantenemos la tasa de ${db.tasa} Bs?`);
            if(!confirmarTasaInicial) {
                let nuevaTasa = prompt("Nueva tasa:", db.tasa);
                if(nuevaTasa) db.tasa = parseFloat(nuevaTasa);
            }

            document.getElementById('tasa-val').innerText = db.tasa.toFixed(2);
            render();
        } catch(e) { alert("Error de conexión"); }
    }

    function render() {
        let saldoBancario = parseFloat(db.saldoInicial) || 0;
        let totalYoDebo = 0;
        let totalMeDeben = 0;
        let pendHtml = "", histHtml = "";

        // PROCESAR MOVIMIENTOS PARA HISTORIAL Y SALDO BANCARIO
        db.movimientos.slice(1).reverse().forEach(m => {
            let mBs = parseFloat(m[3]) || 0;
            let mTasa = parseFloat(m[4]) || db.tasa;
            let tipo = m[1];

            if(["Venta", "Abono_Cobrado"].includes(tipo)) saldoBancario += mBs;
            if(["Gasto", "Abono_Pagado"].includes(tipo)) saldoBancario -= mBs;

            let color = ["Deuda", "Gasto", "Abono_Pagado"].includes(tipo) ? 'var(--rose)' : 'var(--green)';
            if(tipo === "Fiado") color = 'var(--amber)';

            histHtml += `
            <div class="list-item" style="border-right: 4px solid ${color}">
                <div style="flex:1;">
                    <b style="color:#fff">${m[2]}</b><br>
                    <small>${m[0]} | ${tipo}</small>
                </div>
                <div class="amount-text" style="color:${color}">
                    ${mBs.toFixed(2)} Bs<br>
                    <small style="color:var(--gray); font-size:0.65rem">$${(mBs/mTasa).toFixed(2)}</small>
                </div>
            </div>`;
        });

        // PROCESAR ENTIDADES PARA DASHBOARD (PENDIENTES)
        db.entidades.slice(1).forEach(e => {
            let nombre = e[0];
            let saldoDolar = 0;
            let infoOriginal = "";

            db.movimientos.slice(1).forEach(m => {
                if(m[2] === nombre) {
                    let mD = parseFloat(m[3]) / (parseFloat(m[4]) || db.tasa);
                    if(["Fiado", "Abono_Pagado", "Venta"].includes(m[1])) saldoDolar += mD;
                    else saldoDolar -= mD;
                    if(!infoOriginal && !m[1].includes("Abono")) infoOriginal = `Orig: ${parseFloat(m[3]).toFixed(2)} Bs`;
                }
            });

            let absDolar = Math.abs(saldoDolar);
            // Solo mostrar si tiene saldo pendiente y no son categorías de flujo (ENTRADA/GASTO)
            if(absDolar > 0.01 && !["ENTRADA", "GASTO"].includes(nombre.toUpperCase())) {
                let montoHoy = absDolar * db.tasa;
                let esYoDebo = e[1] === "Proveedor";
                
                if(esYoDebo) totalYoDebo += montoHoy;
                else totalMeDeben += montoHoy;

                pendHtml += `
                <div class="list-item" onclick="opcionesPersona('${nombre}', ${absDolar}, ${montoHoy}, '${infoOriginal}', '${e[1]}')">
                    <div><b>${nombre}</b><br><small>${infoOriginal}</small></div>
                    <div class="amount-text" style="color:${esYoDebo?'var(--rose)':'var(--amber)'}">
                        ${montoHoy.toFixed(2)} Bs<br>
                        <small style="color:var(--cyan)">$${absDolar.toFixed(2)}</small>
                    </div>
                </div>`;
            }
        });

        // ACTUALIZAR INTERFAZ
        document.getElementById('bs-total').innerText = saldoBancario.toFixed(2) + " Bs";
        document.getElementById('info-me-deben').innerText = totalMeDeben.toFixed(2) + " Bs";
        document.getElementById('info-yo-debo').innerText = totalYoDebo.toFixed(2) + " Bs";
        document.getElementById('lista-pendientes-inicio').innerHTML = pendHtml || "<p style='padding:20px; color:var(--gray)'>No hay deudas ni fiados activos</p>";
        document.getElementById('lista-historial').innerHTML = histHtml;
    }

    // ... (Mantener funciones opcionesPersona, registrarNuevo y nav igual que antes)
    function opcionesPersona(nom, dolares, bsHoy, infoOrig, tipoEnt) {
        let esProv = tipoEnt === "Proveedor";
        let msj = `RESUMEN: ${nom}\n${infoOrig}\nValor $: ${dolares.toFixed(2)}\n\nAL CAMBIO HOY (${db.tasa}):\nTOTAL: ${bsHoy.toFixed(2)} Bs\n\n1. ABONO\n2. PAGAR TODO\n3. SUMAR\nOpción:`;
        let opc = prompt(msj, "2");
        if(opc === "1") {
            let m = prompt("Monto Bs:");
            if(m) registrarNuevo(esProv ? "Abono_Pagado" : "Abono_Cobrado", nom, m);
        } else if(opc === "2") {
            registrarNuevo(esProv ? "Abono_Pagado" : "Abono_Cobrado", nom, bsHoy.toFixed(2));
        } else if(opc === "3") {
            let m = prompt("Monto nuevo (Bs):");
            if(m) registrarNuevo(esProv ? "Deuda" : "Fiado", nom, m);
        }
    }

    async function registrarNuevo(tipo, nom, mnt) {
        let persona = nom || prompt("Nombre:"); if(!persona) return;
        let monto = mnt || prompt("Monto Bs:"); if(!monto) return;
        document.body.style.opacity="0.4";
        try {
            await fetch(SCRIPT_URL, {
                method:'POST', mode:'no-cors', 
                body: JSON.stringify({ accion:"REGISTRAR", tipo, persona, monto:parseFloat(monto), tasa:db.tasa, descripcion: "App Touch", detalle: "" })
            });
            location.reload();
        } catch(e) { alert("Error"); document.body.style.opacity="1"; }
    }

    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    init();
</script>
</body>
</html>
